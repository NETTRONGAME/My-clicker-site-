<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NetClicker</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>💎</text></svg>">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { touch-action: manipulation; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: #0a0a0a; font-family: -apple-system, sans-serif; color: #fff; min-height: 100vh; overflow-x: hidden; display: flex; justify-content: center; transition: background 0.5s; }
        body.theme-light { background: #f0f0f0; color: #000; }
        body.theme-neon { background: #0a0a2e; color: #0ff; }
        .app { max-width: 420px; width: 100%; padding: 20px; }
        .top-bar { display: flex; justify-content: center; align-items: center; gap: 8px; padding: 10px; background: #1a1a1a; border-radius: 12px; margin-bottom: 10px; font-size: 13px; flex-wrap: wrap; }
        body.theme-light .top-bar { background: #fff; }
        .top-bar button { background: #667eea; color: #fff; border: none; padding: 8px 14px; border-radius: 15px; font-size: 12px; cursor: pointer; }
        .admin-btn { background: #ff4444 !important; }
        .profile-info { text-align: center; padding: 10px; background: #1a1a1a; border-radius: 12px; cursor: pointer; margin-bottom: 10px; }
        .profile-nick { font-size: 18px; font-weight: 700; }
        .profile-level { font-size: 12px; color: #888; }
        .rebirth-badge { display: inline-block; background: linear-gradient(135deg, #ff6600, #ffaa00); color: #000; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; margin-left: 6px; }
        .verified-badge { display: inline-block; background: #44ff44; color: #000; padding: 2px 6px; border-radius: 8px; font-size: 10px; margin-left: 4px; }
        .score { font-size: 48px; font-weight: 800; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; transition: transform 0.15s; }
        .score.pop { transform: scale(1.2); }
        .per-second { font-size: 14px; color: #888; text-align: center; }
        .combo-text { font-size: 13px; font-weight: 700; color: #ff6600; text-align: center; display: block; min-height: 20px; }
        .stats-bar { display: flex; gap: 8px; margin: 15px 0; }
        .stat { flex: 1; background: #1a1a1a; border-radius: 12px; padding: 10px; text-align: center; }
        .stat-value { font-size: 16px; font-weight: 700; color: #667eea; }
        .stat-label { font-size: 10px; color: #888; }
        .clicker-area { display: flex; justify-content: center; align-items: center; padding: 20px 0; position: relative; }
        #clickButton { width: 150px; height: 150px; border-radius: 50%; border: none; font-size: 55px; background: linear-gradient(145deg, #2a2a2a, #1a1a1a); box-shadow: 0 0 30px rgba(102,126,234,0.4), 0 0 60px rgba(102,126,234,0.2); cursor: pointer; transition: transform 0.1s, box-shadow 0.15s; touch-action: manipulation; outline: none; position: relative; z-index: 10; }
        #clickButton:active { transform: scale(0.85); box-shadow: 0 0 80px rgba(102,126,234,0.9), 0 0 120px rgba(118,75,162,0.6); }
        .float-text { position: absolute; font-size: 24px; font-weight: 900; background: linear-gradient(135deg, #667eea, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; pointer-events: none; z-index: 20; animation: floatUp 1s ease-out forwards; filter: drop-shadow(0 0 10px rgba(102,126,234,0.8)); }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(0.5); } 30% { opacity: 1; transform: translateY(-30px) scale(1.3); } 100% { opacity: 0; transform: translateY(-120px) scale(0.8); } }
        .particle { position: absolute; pointer-events: none; z-index: 5; font-size: 18px; animation: particleBurst 0.8s ease-out forwards; }
        @keyframes particleBurst { 0% { opacity: 1; transform: translate(0,0) scale(1) rotate(0deg); } 100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0) rotate(180deg); } }
        .ripple { position: absolute; border-radius: 50%; border: 2px solid rgba(102,126,234,0.5); animation: rippleEffect 0.6s ease-out forwards; pointer-events: none; z-index: 1; }
        @keyframes rippleEffect { 0% { width: 50px; height: 50px; opacity: 1; } 100% { width: 200px; height: 200px; opacity: 0; } }
        .tabs-row { display: flex; gap: 4px; background: #1a1a1a; border-radius: 14px; padding: 5px; justify-content: center; flex-wrap: wrap; margin: 15px 0; }
        .tab { width: 40px; height: 40px; border-radius: 10px; border: none; background: transparent; color: #888; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .tab.active { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; box-shadow: 0 0 12px rgba(102,126,234,0.5); }
        .shop-item { background: #1a1a1a; border-radius: 14px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .item-info { flex: 1; }
        .item-name { font-size: 15px; font-weight: 600; }
        .item-desc { font-size: 11px; color: #888; }
        .item-cost { font-size: 10px; color: #667eea; margin-top: 4px; }
        .btn { padding: 10px 16px; border-radius: 20px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; color: #fff; }
        .btn-buy { background: linear-gradient(135deg, #667eea, #764ba2); box-shadow: 0 0 10px rgba(102,126,234,0.3); }
        .btn-buy.locked { background: #333; color: #666; box-shadow: none; }
        .btn-potion { background: linear-gradient(135deg, #ff8800, #ffaa00); color: #000; box-shadow: 0 0 10px rgba(255,136,0,0.3); }
        .btn-potion.locked { background: #333; color: #666; box-shadow: none; }
        .btn-potion.active { background: #44ff44 !important; color: #000 !important; animation: glowPulse 1s infinite; }
        @keyframes glowPulse { 0%,100% { box-shadow: 0 0 10px #44ff44; } 50% { box-shadow: 0 0 25px #44ff44; } }
        .btn-rebirth { padding: 12px 20px; border-radius: 20px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; background: linear-gradient(135deg, #ff4444, #ff8800); color: #fff; width: 100%; box-shadow: 0 0 15px rgba(255,68,68,0.3); }
        .btn-rebirth.locked { background: #333; color: #666; box-shadow: none; }
        .section { display: none; }
        .section.active { display: block; }
        .msg { text-align: center; padding: 8px; font-size: 13px; color: #667eea; min-height: 20px; }
        .lb-row { display: flex; align-items: center; gap: 10px; padding: 10px; background: #1a1a1a; border-radius: 10px; margin-bottom: 5px; }
        .lb-rank { font-size: 18px; font-weight: 700; width: 30px; color: #667eea; }
        .lb-name { flex: 1; font-size: 14px; }
        .lb-score { font-weight: 700; color: #ffaa00; }
        .btn-lb { padding: 8px 14px; border-radius: 15px; border: none; font-size: 12px; cursor: pointer; background: #333; color: #fff; margin: 2px; }
        .btn-lb.active { background: #667eea; }
        .skin-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 10px 0; }
        .skin-btn { width: 100%; aspect-ratio: 1; border-radius: 15px; border: 2px solid #333; background: #1a1a1a; font-size: 28px; cursor: pointer; transition: all 0.2s; }
        .skin-btn.active { border-color: #667eea; box-shadow: 0 0 15px rgba(102,126,234,0.5); transform: scale(1.05); }
        .skin-btn.locked { opacity: 0.3; }
        .theme-btn { padding: 8px 12px; border-radius: 10px; border: 1px solid #444; background: #1a1a1a; color: #fff; cursor: pointer; font-size: 12px; margin: 2px; }
        .theme-btn.active { border-color: #667eea; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; }
        .overlay.show { display: flex; }
        .modal { background: #1a1a1a; border-radius: 20px; padding: 20px; width: 90%; max-width: 350px; max-height: 80vh; overflow-y: auto; }
        .modal h3 { margin-bottom: 12px; }
        .modal input { width: 100%; padding: 10px; background: #111; color: #fff; border: 1px solid #333; border-radius: 10px; font-size: 14px; margin-bottom: 10px; }
        .modal textarea { width: 100%; height: 80px; background: #111; color: #fff; border: 1px solid #333; border-radius: 10px; padding: 10px; font-size: 11px; resize: none; margin-bottom: 10px; }
        .modal .btn-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .modal .link { color: #667eea; font-size: 12px; cursor: pointer; text-align: center; margin-top: 8px; }
        .modal .error-msg { color: #ff4444; font-size: 12px; text-align: center; margin: 8px 0; min-height: 16px; }
        .modal .success-msg { color: #44ff44; font-size: 12px; text-align: center; margin: 8px 0; min-height: 16px; }
        .admin-player { display: flex; align-items: center; justify-content: space-between; padding: 10px; background: #1a1a1a; border-radius: 10px; margin-bottom: 5px; gap: 8px; flex-wrap: wrap; }
        .admin-player .info { flex: 1; font-size: 12px; min-width: 100px; }
        .admin-player button { padding: 6px 10px; border-radius: 12px; border: none; font-size: 11px; cursor: pointer; color: #fff; }
        .btn-verify { background: #44aa44; }
        .btn-unverify { background: #888; }
        .btn-delete { background: #ff4444; }
    </style>
</head>
<body ontouchstart="">
    <div class="app">
        <div class="top-bar" id="topBar">
            <span>👤 <span id="topNick">Игрок</span></span>
            <button onclick="changeNick()">✏️ Ник</button>
            <button id="authBtn" onclick="showAuth()">🔐 Войти</button>
            <button id="adminBtn" class="admin-btn" style="display:none;" onclick="showAdmin()">🔒</button>
        </div>
        <div class="profile-info" id="profileBar">
            <div><span class="profile-nick" id="profileNick">Игрок</span><span class="verified-badge" id="verifiedBadge" style="display:none;">✅</span><span class="rebirth-badge" id="rebirthBadge" style="display:none">⭐<span id="rebirthCount">0</span></span></div>
            <div class="profile-level" id="profileLevel">Уровень 1</div>
        </div>
        <div class="score" id="score">0</div>
        <div class="per-second" id="perSecond">0/сек</div>
        <span class="combo-text" id="comboText"></span>
        <div class="stats-bar">
            <div class="stat"><div class="stat-value" id="clickPower">1</div><div class="stat-label">Сила</div></div>
            <div class="stat"><div class="stat-value" id="multiplierDisplay">x1</div><div class="stat-label">Множ</div></div>
            <div class="stat"><div class="stat-value" id="totalEarned">0</div><div class="stat-label">Всего</div></div>
        </div>
        <div class="clicker-area" id="clickerArea"><button id="clickButton">💎</button></div>
        <div class="tabs-row">
            <button class="tab active" id="tabShop">🏪</button>
            <button class="tab" id="tabPotions">🧪</button>
            <button class="tab" id="tabRebirth">🔄</button>
            <button class="tab" id="tabSkins">🎨</button>
            <button class="tab" id="tabLeaderboard">🏆</button>
        </div>
        <div class="section active" id="shopSection"></div>
        <div class="section" id="potionsSection"></div>
        <div class="section" id="rebirthSection"></div>
        <div class="section" id="skinsSection"></div>
        <div class="section" id="leaderboardSection"></div>
        <div class="msg" id="message"></div>
        <div style="display:flex;gap:8px;justify-content:center;margin-top:15px;">
            <button class="btn btn-buy" id="saveBtn">💾</button>
            <button class="btn" style="background:#333;" id="loadBtn">📂</button>
            <button class="btn" style="background:#333;" id="resetBtn">🔄</button>
        </div>
    </div>

    <div class="overlay" id="authOverlay"><div class="modal">
        <h3 id="authTitle">🔐 Вход / Регистрация</h3>
        <input type="email" id="authEmail" placeholder="Email">
        <input type="password" id="authPass" placeholder="Пароль (мин 6 символов)">
        <div class="error-msg" id="authError"></div>
        <div class="success-msg" id="authSuccess"></div>
        <div class="btn-row" id="authBtns">
            <button class="btn btn-buy" id="loginBtn">Войти</button>
            <button class="btn" style="background:#44aa44;" id="registerBtn">Регистрация</button>
        </div>
        <div class="link" id="forgotLink" onclick="showResetPassword()">Забыли пароль?</div>
        <div class="link" id="backLink" onclick="showAuth()" style="display:none;">← Назад</div>
        <div class="link" onclick="hideOverlay()">Закрыть</div>
    </div></div>

    <div class="overlay" id="adminOverlay"><div class="modal">
        <h3>🔒 Админ-панель</h3>
        <div id="adminContent">Загрузка...</div>
        <div class="link" onclick="hideOverlay()">Закрыть</div>
    </div></div>

    <div class="overlay" id="saveOverlay"><div class="modal"><h3>💾 Сохранение</h3><textarea id="saveCodeText" readonly></textarea><div class="btn-row"><button class="btn btn-buy" id="copySaveBtn">📋</button><button class="btn" style="background:#333;" onclick="hideOverlay()">✕</button></div></div></div>
    <div class="overlay" id="loadOverlay"><div class="modal"><h3>📂 Загрузка</h3><textarea id="loadCodeText" placeholder="Вставьте код..."></textarea><div class="btn-row"><button class="btn btn-buy" id="confirmLoadBtn">✅</button><button class="btn" style="background:#333;" onclick="hideOverlay()">✕</button></div></div></div>
    <div class="overlay" id="nickOverlay"><div class="modal"><h3>👤 Сменить ник</h3><input type="text" id="nickInput" maxlength="16"><div class="btn-row"><button class="btn btn-buy" id="confirmNickBtn">✅</button><button class="btn" style="background:#333;" onclick="hideOverlay()">✕</button></div></div></div>
    <div class="overlay" id="resetOverlay"><div class="modal"><h3>⚠️ Сброс</h3><p style="color:#888;margin-bottom:12px;">Все данные будут удалены!</p><div class="btn-row"><button class="btn" style="background:#ff3b30;" id="confirmResetBtn">Да</button><button class="btn" style="background:#333;" onclick="hideOverlay()">Нет</button></div></div></div>

    <script>
        firebase.initializeApp({
            apiKey: "AIzaSyAlXOn--D6dI5P66Ud0R_i94zHpN7aqQOo",
            authDomain: "netclick-9893b.firebaseapp.com",
            projectId: "netclick-9893b",
            storageBucket: "netclick-9893b.firebasestorage.app",
            messagingSenderId: "471598367997",
            appId: "1:471598367997:web:9cd425ae622e0d060cea94"
        });
        const auth = firebase.auth();
        const db = firebase.firestore();

        var user=null,coins=0,cp=1,mult=1,cps=0,earned=0,clicks=0,nick='Игрок';
        var rebirths=0,rBonus=0,comboT=0,comboC=0,comboM=1,lbType='coins';
        var skin='💎',theme='dark',isAdmin=false,isVerified=false;
        var allSkins=['💎','💰','🔥','⭐','🌟','🎯','👑','💀','❤️','🎪','🔮'];
        var unlockedSkins=['💎'];

        var potions={cb:{n:'⚡ Зелье клика',d:'x2 сила клика на 30 сек',bc:100,a:false,t:0,dur:30},ab:{n:'⏱ Зелье скорости',d:'x2 автодоход на 30 сек',bc:200,a:false,t:0,dur:30},cr:{n:'💰 Зелье богатства',d:'x3 монеты на 15 сек',bc:500,a:false,t:0,dur:15}};
        var items=[{n:'Усиленный клик',d:'+1 к силе',c:10,o:0,b:1,ty:'click'},{n:'Авто-сборщик',d:'+1/сек',c:50,o:0,b:1,ty:'auto'},{n:'Множитель x2',d:'Удваивает',c:200,o:0,b:1,ty:'multi'},{n:'Супер-клик',d:'+10 к силе',c:500,o:0,b:10,ty:'click'},{n:'Мега-ферма',d:'+10/сек',c:2000,o:0,b:10,ty:'auto'}];

        function msg(t){var m=document.getElementById('message');m.textContent=t;clearTimeout(m._t);m._t=setTimeout(function(){m.textContent='';},3000);}
        function lvl(){var l=1,t=100,r=earned;while(r>=t){r-=t;l++;t=Math.floor(t*1.5);}return l;}
        function pc(p){return Math.floor(p.bc*(1+(lvl()-1)*0.2)*(1+rebirths*0.5));}
        function rr(){return Math.floor(10000*Math.pow(2,rebirths));}
        function eClick(){var p=cp;if(potions.cb.a)p*=2;return p;}
        function eCPS(){var c=cps;if(potions.ab.a)c*=2;return c;}
        function eMult(){var m=mult*comboM;if(potions.cr.a)m*=3;return m;}
        function applyTheme(){document.body.className='theme-'+theme;}

        function getSaveData(){return{coins:Math.floor(coins),cp:cp,mult:mult,cps:cps,earned:Math.floor(earned),clicks:clicks,nick:nick,rebirths:rebirths,rBonus:rBonus,skin:skin,theme:theme,unlockedSkins:unlockedSkins,items:items.map(function(it){return it.o;})};}
        function loadData(d){
            if(!d)return;
            coins=d.coins||0;cp=d.cp||d.clickPower||1;mult=d.mult||d.multiplier||1;cps=d.cps||d.coinsPerSecond||0;
            earned=d.earned||d.totalEarned||0;clicks=d.clicks||d.totalClicks||0;
            nick=d.nick||d.playerNick||'Игрок';rebirths=d.rebirths||0;rBonus=d.rBonus||d.rebirthBonus||0;
            skin=d.skin||'💎';theme=d.theme||'dark';unlockedSkins=d.unlockedSkins||['💎'];
            if(d.items)for(var i=0;i<d.items.length;i++)if(items[i])items[i].o=d.items[i];
            applyTheme();document.getElementById('clickButton').textContent=skin;
            updateUI();updateTopBar();
        }
        function saveLocal(){try{localStorage.setItem('clicker_save',JSON.stringify(getSaveData()));}catch(e){}}
        function loadLocal(){try{var d=localStorage.getItem('clicker_save');if(d)loadData(JSON.parse(d));}catch(e){}}

        // Сохранение в облако — только для email-аккаунтов
        async function saveCloud(){
            if(!user||user.isAnonymous||!user.email)return;
            try{
                var d=getSaveData();d.nick=nick;d.uid=user.uid;d.email=user.email;
                d.updatedAt=firebase.firestore.FieldValue.serverTimestamp();
                await db.collection('users').doc(user.email).set(d,{merge:true});
            }catch(e){}
        }

        // Загрузка из облака — только если есть данные
        async function loadCloud(){
            if(!user||!user.email)return false;
            try{
                var doc=await db.collection('users').doc(user.email).get();
                if(doc.exists){
                    var data=doc.data();
                    if(data.coins>0||data.clicks>0||data.rebirths>0){
                        loadData(data);saveLocal();msg('✅ Прогресс загружен');return true;
                    }
                }
            }catch(e){}
            return false;
        }

        // Админ-панель
        async function checkAdmin(){
            if(!user||!user.email)return;
            try{
                var allAdmins=await db.collection('admins').where('email','==',user.email).get();
                if(!allAdmins.empty){isAdmin=true;document.getElementById('adminBtn').style.display='inline-block';}
                var vdoc=await db.collection('users').doc(user.email).get();
                if(vdoc.exists&&vdoc.data().verified){isVerified=true;document.getElementById('verifiedBadge').style.display='inline-block';}
            }catch(e){}
        }
        async function showAdmin(){
            if(!isAdmin)return;
            document.getElementById('adminOverlay').classList.add('show');
            document.getElementById('adminContent').innerHTML='Загрузка...';
            try{
                var s=await db.collection('users').orderBy('coins','desc').limit(50).get();
                var h='';s.forEach(function(doc){var d=doc.data();var vid=doc.id;
                    h+='<div class="admin-player"><div class="info"><b>'+(d.nick||d.email||'Игрок')+'</b><br><small>💰'+Math.floor(d.coins||0)+'</small></div>';
                    h+='<button class="'+(d.verified?'btn-unverify':'btn-verify')+'" onclick="toggleVerify(\''+vid+'\','+(d.verified?false:true)+')">'+(d.verified?'✅':'☑')+'</button>';
                    h+='<button class="btn-delete" onclick="deletePlayer(\''+vid+'\',\''+(d.nick||d.email||'Игрок')+'\')">❌</button></div>';});
                document.getElementById('adminContent').innerHTML=h||'Нет игроков';
            }catch(e){}
        }
        async function toggleVerify(uid,status){try{await db.collection('users').doc(uid).update({verified:status});msg(status?'✅ Верифицирован':'❌ Снято');showAdmin();}catch(e){}}
        async function deletePlayer(uid,name){if(!confirm('Удалить '+name+'?'))return;try{await db.collection('users').doc(uid).delete();msg('❌ '+name);showAdmin();}catch(e){}}

        // Лидерборды
        async function loadLB(){
            try{
                var s=await db.collection('users').orderBy(lbType,'desc').limit(20).get();
                var h='<div style="padding:10px;"><div style="display:flex;gap:5px;margin-bottom:10px;justify-content:center;">';
                h+='<button class="btn-lb'+(lbType==='coins'?' active':'')+'" onclick="setLB(\'coins\')">💰 Монеты</button>';
                h+='<button class="btn-lb'+(lbType==='clicks'?' active':'')+'" onclick="setLB(\'clicks\')">👆 Клики</button>';
                h+='<button class="btn-lb'+(lbType==='rebirths'?' active':'')+'" onclick="setLB(\'rebirths\')">🔄 Перерождения</button></div>';
                var docs=[];s.forEach(function(doc){docs.push(doc.data());});
                docs.sort(function(a,b){return(b[lbType]||0)-(a[lbType]||0);});
                if(docs.length===0)h+='<div style="text-align:center;color:#888;padding:20px;">Пусто</div>';
                else for(var i=0;i<Math.min(docs.length,20);i++){var dt=docs[i];h+='<div class="lb-row"><div class="lb-rank">'+(i+1)+'</div><div class="lb-name">'+(dt.nick||dt.email||'Игрок')+(dt.verified?' ✅':'')+'</div><div class="lb-score">'+(dt[lbType]||0)+'</div></div>';}
                h+='</div>';document.getElementById('leaderboardSection').innerHTML=h;
            }catch(e){}
        }
        function setLB(t){lbType=t;loadLB();}

        function hideOverlay(){['authOverlay','adminOverlay','saveOverlay','loadOverlay','nickOverlay','resetOverlay'].forEach(function(id){document.getElementById(id).classList.remove('show');});}
        function showAuth(){
            document.getElementById('authTitle').textContent='🔐 Вход / Регистрация';
            document.getElementById('authEmail').value='';document.getElementById('authPass').value='';
            document.getElementById('authPass').style.display='block';
            document.getElementById('authError').textContent='';document.getElementById('authSuccess').textContent='';
            document.getElementById('authBtns').innerHTML='<button class="btn btn-buy" id="loginBtn">Войти</button><button class="btn" style="background:#44aa44;" id="registerBtn">Регистрация</button>';
            document.getElementById('forgotLink').style.display='block';document.getElementById('backLink').style.display='none';
            document.getElementById('authOverlay').classList.add('show');
            document.getElementById('loginBtn').onclick=function(){
                var email=document.getElementById('authEmail').value.trim(),pass=document.getElementById('authPass').value;
                if(!email||!pass){document.getElementById('authError').textContent='Заполните все поля';return;}
                auth.signInWithEmailAndPassword(email,pass).then(function(r){user=r.user;hideOverlay();loadCloud().then(function(loaded){if(!loaded)saveCloud();updateTopBar();checkAdmin();msg('✅ Вы вошли');});})
                .catch(function(e){document.getElementById('authError').textContent=e.code==='auth/user-not-found'?'Аккаунт не найден':e.code==='auth/wrong-password'?'Неверный пароль':e.message;});
            };
            document.getElementById('registerBtn').onclick=function(){
                var email=document.getElementById('authEmail').value.trim(),pass=document.getElementById('authPass').value;
                if(!email||!pass){document.getElementById('authError').textContent='Заполните все поля';return;}
                if(pass.length<6){document.getElementById('authError').textContent='Пароль минимум 6 символов';return;}
                auth.createUserWithEmailAndPassword(email,pass).then(function(r){user=r.user;nick=email.split('@')[0];r.user.sendEmailVerification();msg('📧 Проверьте почту!');hideOverlay();updateTopBar();saveCloud();saveLocal();})
                .catch(function(e){document.getElementById('authError').textContent=e.code==='auth/email-already-in-use'?'Email уже зарегистрирован':e.message;});
            };
        }
        function showResetPassword(){
            document.getElementById('authTitle').textContent='🔑 Сброс пароля';document.getElementById('authPass').style.display='none';
            document.getElementById('authError').textContent='';document.getElementById('authSuccess').textContent='';
            document.getElementById('authBtns').innerHTML='<button class="btn btn-buy" id="resetPassBtn" style="width:100%;">📧 Отправить ссылку</button>';
            document.getElementById('forgotLink').style.display='none';document.getElementById('backLink').style.display='block';
            document.getElementById('resetPassBtn').onclick=function(){var email=document.getElementById('authEmail').value.trim();if(!email){document.getElementById('authError').textContent='Введите email';return;}
                auth.sendPasswordResetEmail(email).then(function(){document.getElementById('authSuccess').textContent='✅ Письмо отправлено!';}).catch(function(e){document.getElementById('authError').textContent=e.message;});};
        }
        function logout(){auth.signOut();user=null;isAdmin=false;isVerified=false;updateTopBar();updateUI();msg('Вы вышли');}
        function updateTopBar(){
            document.getElementById('topNick').textContent=nick;document.getElementById('profileNick').textContent=nick;
            document.getElementById('profileLevel').textContent='Уровень '+lvl();
            document.getElementById('rebirthBadge').style.display=rebirths>0?'inline-block':'none';
            document.getElementById('rebirthCount').textContent=rebirths;
            document.getElementById('verifiedBadge').style.display=isVerified?'inline-block':'none';
            document.getElementById('adminBtn').style.display=isAdmin?'inline-block':'none';
            var b=document.getElementById('authBtn');
            if(user&&!user.isAnonymous){b.textContent='Выйти';b.onclick=logout;}else{b.textContent='🔐 Войти';b.onclick=showAuth;}
        }
        function changeNick(){document.getElementById('nickInput').value=nick;document.getElementById('nickOverlay').classList.add('show');}
        document.getElementById('confirmNickBtn').onclick=function(){var n=document.getElementById('nickInput').value.trim();if(!n){msg('Ник пуст');return;}nick=n;hideOverlay();updateTopBar();saveLocal();saveCloud();msg('Ник: '+nick);};
        auth.onAuthStateChanged(function(u){user=u;updateTopBar();updateUI();if(user&&user.email){loadCloud().then(function(loaded){if(!loaded)saveCloud();checkAdmin();});}});

        function doReset(){document.getElementById('resetOverlay').classList.add('show');}
        document.getElementById('confirmResetBtn').onclick=function(){
            coins=0;cp=1;mult=1;cps=0;earned=0;clicks=0;rebirths=0;rBonus=0;comboC=0;comboM=1;
            skin='💎';theme='dark';unlockedSkins=['💎'];
            for(var i=0;i<items.length;i++)items[i].o=0;
            for(var k in potions){potions[k].a=false;potions[k].t=0;}
            applyTheme();document.getElementById('clickButton').textContent='💎';
            saveLocal();saveCloud();hideOverlay();updateUI();updateTopBar();msg('Сброшено');
        };
        function doRebirth(){
            var r=rr();if(coins<r){msg('Нужно '+r+' монет');return;}
            coins=0;cp=1;cps=0;earned=0;clicks=0;
            for(var i=0;i<items.length;i++)items[i].o=0;
            for(var k in potions){potions[k].a=false;potions[k].t=0;}
            rebirths++;rBonus+=0.5;mult=1+rBonus;comboC=0;comboM=1;
            if(rebirths%2===0&&unlockedSkins.length<allSkins.length){
                var locked=allSkins.filter(function(s){return unlockedSkins.indexOf(s)===-1;});
                if(locked.length>0){var ns=locked[Math.floor(Math.random()*locked.length)];unlockedSkins.push(ns);msg('Новый скин: '+ns+'!');}
            }
            saveLocal();saveCloud();updateUI();msg('Перерождение '+rebirths+'!');
        }
        function spawnParticles(x,y,c){
            var area=document.getElementById('clickerArea'),emojis=['✨','💫','⭐','🌟','💎','🔥','💥','🎉'];
            for(var i=0;i<c;i++){var p=document.createElement('div');p.className='particle';p.textContent=emojis[Math.floor(Math.random()*emojis.length)];p.style.left=x+'px';p.style.top=y+'px';var a=Math.random()*Math.PI*2,d=30+Math.random()*100;p.style.setProperty('--dx',Math.cos(a)*d+'px');p.style.setProperty('--dy',Math.sin(a)*d+'px');area.appendChild(p);setTimeout(function(){p.remove();},800);}
        }

        function updateUI(){
            var se=document.getElementById('score');se.textContent=Math.floor(coins);se.classList.add('pop');setTimeout(function(){se.classList.remove('pop');},150);
            document.getElementById('perSecond').textContent=(eCPS()*eMult()).toFixed(1)+'/сек';
            document.getElementById('clickPower').textContent=eClick();
            document.getElementById('multiplierDisplay').textContent='x'+eMult().toFixed(1);
            document.getElementById('totalEarned').textContent=Math.floor(earned);
            document.getElementById('comboText').textContent=comboM>1?'🔥 Комбо x'+comboC+'! (x'+comboM+')':'';
            var h='';for(var i=0;i<items.length;i++){var it=items[i],c=Math.floor(it.c*Math.pow(1.5+i*0.2,it.o));h+='<div class="shop-item"><div class="item-info"><div class="item-name">'+it.n+' ('+it.o+')</div><div class="item-desc">'+it.d+'</div><div class="item-cost">💰 '+c+'</div></div><button class="btn btn-buy'+(coins>=c?'':' locked')+'" data-idx="'+i+'">Купить</button></div>';}
            document.getElementById('shopSection').innerHTML=h;
            var bs=document.querySelectorAll('#shopSection .btn-buy');for(var j=0;j<bs.length;j++){bs[j].onclick=function(){var idx=parseInt(this.getAttribute('data-idx')),it=items[idx],c=Math.floor(it.c*Math.pow(1.5+idx*0.2,it.o));if(coins<c)return;coins-=c;it.o++;if(it.ty==='click')cp+=it.b;if(it.ty==='auto')cps+=it.b;if(it.ty==='multi')mult+=it.b;saveLocal();saveCloud();updateUI();};}
            var ph='';for(var k in potions){var p=potions[k],c=pc(p),cls='btn btn-potion',txt='💰 '+c;if(p.a){cls+=' active';txt='Активно '+Math.ceil(p.t)+'с';}else if(coins<c)cls+=' locked';ph+='<div class="shop-item"><div class="item-info"><div class="item-name">'+p.n+'</div><div class="item-desc">'+p.d+'</div></div><button class="'+cls+'" data-p="'+k+'">'+txt+'</button></div>';}
            document.getElementById('potionsSection').innerHTML=ph;
            var pbs=document.querySelectorAll('#potionsSection .btn-potion');for(var pj=0;pj<pbs.length;pj++){pbs[pj].onclick=function(){var key=this.getAttribute('data-p'),po=potions[key],c=pc(po);if(po.a||coins<c)return;coins-=c;po.a=true;po.t=po.dur;saveLocal();saveCloud();updateUI();};}
            var req=rr();
            document.getElementById('rebirthSection').innerHTML='<div style="text-align:center;padding:20px;"><div style="font-size:50px;">🔄</div><div style="font-size:18px;">Перерождение</div><div style="color:#888;">Бонус: x'+(1+rBonus).toFixed(1)+'</div><div style="color:#888;">Нужно: '+req+' 💰</div><button class="btn-rebirth'+(coins>=req?'':' locked')+'" onclick="doRebirth()">Переродиться</button></div>';
            var sh='<div style="text-align:center;padding:10px;"><div style="font-weight:700;">Скины</div><div class="skin-grid">';
            for(var si=0;si<allSkins.length;si++){var s=allSkins[si],unlocked=unlockedSkins.indexOf(s)!==-1;sh+='<button class="skin-btn'+(s===skin?' active':'')+(!unlocked?' locked':'')+'" data-skin="'+s+'"'+(unlocked?'':' disabled')+'>'+s+'</button>';}
            sh+='</div><div style="margin-top:12px;"><div style="font-weight:700;">Тема</div>';
            sh+='<button class="theme-btn'+(theme==='dark'?' active':'')+'" data-theme="dark">🌙</button>';
            sh+='<button class="theme-btn'+(theme==='light'?' active':'')+'" data-theme="light">☀️</button>';
            sh+='<button class="theme-btn'+(theme==='neon'?' active':'')+'" data-theme="neon">💜</button></div></div>';
            document.getElementById('skinsSection').innerHTML=sh;
            var sbtns=document.querySelectorAll('#skinsSection .skin-btn:not([disabled])');for(var sj=0;sj<sbtns.length;sj++){sbtns[sj].onclick=function(){skin=this.getAttribute('data-skin');document.getElementById('clickButton').textContent=skin;saveLocal();saveCloud();updateUI();};}
            var tbtns=document.querySelectorAll('#skinsSection .theme-btn');for(var tj=0;tj<tbtns.length;tj++){tbtns[tj].onclick=function(){theme=this.getAttribute('data-theme');applyTheme();saveLocal();saveCloud();updateUI();};}
        }

        document.getElementById('clickButton').addEventListener('click',function(e){
            e.preventDefault();comboC++;comboT=1.5;
            if(comboC>=100)comboM=5;else if(comboC>=50)comboM=3;else if(comboC>=20)comboM=2;else if(comboC>=10)comboM=1.5;else comboM=1;
            var ev=eClick()*eMult();coins+=ev;earned+=ev;clicks++;
            var rect=this.getBoundingClientRect(),cx=e.clientX-rect.left,cy=e.clientY-rect.top;
            var el=document.createElement('div');el.className='float-text';el.textContent='+'+ev.toFixed(0);el.style.left=(cx-30)+'px';el.style.top=(cy-40)+'px';
            document.getElementById('clickerArea').appendChild(el);setTimeout(function(){el.remove();},1000);
            spawnParticles(cx,cy,comboC>=20?15:8);
            var ripple=document.createElement('div');ripple.className='ripple';ripple.style.left=(cx-25)+'px';ripple.style.top=(cy-25)+'px';
            document.getElementById('clickerArea').appendChild(ripple);setTimeout(function(){ripple.remove();},600);
            saveLocal();saveCloud();updateUI();
        });

        function switchTab(t){
            var tabs=['tabShop','tabPotions','tabRebirth','tabSkins','tabLeaderboard'],secs=['shopSection','potionsSection','rebirthSection','skinsSection','leaderboardSection'];
            for(var i=0;i<tabs.length;i++){document.getElementById(tabs[i]).classList.remove('active');document.getElementById(secs[i]).classList.remove('active');}
            if(t==='shop'){document.getElementById('tabShop').classList.add('active');document.getElementById('shopSection').classList.add('active');}
            else if(t==='potions'){document.getElementById('tabPotions').classList.add('active');document.getElementById('potionsSection').classList.add('active');}
            else if(t==='rebirth'){document.getElementById('tabRebirth').classList.add('active');document.getElementById('rebirthSection').classList.add('active');}
            else if(t==='skins'){document.getElementById('tabSkins').classList.add('active');document.getElementById('skinsSection').classList.add('active');}
            else{document.getElementById('tabLeaderboard').classList.add('active');document.getElementById('leaderboardSection').classList.add('active');loadLB();}
            updateUI();
        }

        document.getElementById('tabShop').onclick=function(){switchTab('shop');};
        document.getElementById('tabPotions').onclick=function(){switchTab('potions');};
        document.getElementById('tabRebirth').onclick=function(){switchTab('rebirth');};
        document.getElementById('tabSkins').onclick=function(){switchTab('skins');};
        document.getElementById('tabLeaderboard').onclick=function(){switchTab('leaderboard');};
        document.getElementById('saveBtn').onclick=function(){document.getElementById('saveCodeText').value=JSON.stringify(getSaveData());document.getElementById('saveOverlay').classList.add('show');};
        document.getElementById('loadBtn').onclick=function(){document.getElementById('loadCodeText').value='';document.getElementById('loadOverlay').classList.add('show');};
        document.getElementById('copySaveBtn').onclick=function(){document.getElementById('saveCodeText').select();document.execCommand('copy');msg('Скопировано');};
        document.getElementById('confirmLoadBtn').onclick=function(){var c=document.getElementById('loadCodeText').value;if(c){loadData(JSON.parse(c));saveLocal();saveCloud();hideOverlay();updateUI();msg('Загружено!');}};
        document.getElementById('resetBtn').onclick=doReset;

        setInterval(function(){if(comboT>0){comboT-=0.1;if(comboT<=0){comboC=0;comboM=1;updateUI();}}},100);
        setInterval(function(){var c=false;for(var k in potions){if(potions[k].a){potions[k].t-=1;if(potions[k].t<=0){potions[k].a=false;potions[k].t=0;c=true;}}}if(c)updateUI();},1000);
        setInterval(function(){if(cps>0){coins+=eCPS()*eMult();earned+=eCPS()*eMult();updateUI();}},1000);

        loadLocal();updateUI();updateTopBar();
    </script>
</body>
